services:
  postgres:
    image: postgres:16-alpine
    container_name: dten-weekly-postgres
    restart: unless-stopped
    environment:
      POSTGRES_USER: postgres
      POSTGRES_PASSWORD: postgres
      POSTGRES_DB: dten_weekly_execution
    ports:
      - "5432:5432"
    volumes:
      - dten-weekly-postgres-data:/var/lib/postgresql/data
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U postgres -d dten_weekly_execution"]
      interval: 5s
      timeout: 5s
      retries: 12

volumes:
  dten-weekly-postgres-data:
